# Bind 'r' to reload the config file
unbind r
bind r source-file ~/.tmux.conf

# Set the leader key to 'CTRL - s'
unbind C-b
set -g prefix C-a

# Set hjkl to change panes
set-window-option -g mode-keys vi
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Set new panes to open in current directory
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Misc
set-option -g default-terminal 'screen-256color'
set-option -g terminal-overrides ',xterm-256color:RGB'
set-option -g focus-events on
set-option -g base-index 1
set-option -g renumber-windows on
set-option -g set-clipboard on
set-option -g escape-time 0
set-option -g status-position top

# Make the status bar 2 lines tall for spacing
set -g status 2
set -g 'status-format[1]' ''

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'Nybkox/tmux-ukiyo'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'omerxx/tmux-sessionx'

set -g @continuum-restore 'on'

# Theme setup
set -g @ukiyo-theme 'kanagawa/wave'
set -g @ukiyo-ignore-window-colors true
set -g @ukiyo-plugins 'continuum cwd time'
set -g @ukiyo-time-format "%H:%M"
# set -g @ukiyo-show-powerline true
# set -g @ukiyo-show-left-sep ◤
# set -g @ukiyo-show-right-sep ◥
# set -g @ukiyo-show-edge-icons true
# set -g @ukiyo-transparent-powerline-bg true
set -g @ukiyo-border-contrast true

# Initializing TPM
run '/usr/share/tmux-plugin-manager/tpm'

# Makes the bar transparent (MUST BE HERE)
set-option -g status-style bg=default
