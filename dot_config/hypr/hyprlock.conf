background {
  monitor =
  path = ~/.local/share/wallpaper.jpg
  blur_passes = 3
  contrast = 0.8916
  brightness = 0.8172
  vibrancy = 0.1696
  vibrancy_darkness = 0.0
}

input-field {
  monitor =
  size = 200, 40
  outline_thickness = 2
  dots_size = 0.2
  dots_spacing = 0.2
  dots_center = true
  outer_color = rgba(0, 0, 0, 0)
  inner_color = rgba(0, 0, 0, 0.5)
  font_color = rgb(242, 244, 248)
  fade_on_empty = false
  font_family JetBrains Mono
  placeholder_text = <i><span weight="600">Password </span></i>
  hide_input = false
  position = 0, -120
  halign = center
  valign = center
}

# Time
label {
  monitor =
  text = cmd[update:1000] echo "$(date +"%H:%M")"
  font_size = 100
  color = rgb(242, 244, 248)
  font_family = JetBrains Mono
  position = 0, -300
  halign = center
  valign = top
}

