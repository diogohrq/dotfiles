# ┳┳┓┏┓┳┓┳┏┳┓┏┓┳┓┏┓
# ┃┃┃┃┃┃┃┃ ┃ ┃┃┣┫┗┓
# ┛ ┗┗┛┛┗┻ ┻ ┗┛┛┗┗┛

# monitor=eDP-1,disable
# monitor=HDMI-A-1,1920x1080@60,auto,1
monitor=eDP-1,1920x1080@60,auto,1.2
# monitor=HDMI-A-1,disable
#
xwayland {
  force_zero_scaling = true
}

# ┏┓┳┓┏┓┏┓┳┓┏┓┳┳┓┏┓
# ┃┃┣┫┃┃┃┓┣┫┣┫┃┃┃┗┓
# ┣┛┛┗┗┛┗┛┛┗┛┗┛ ┗┗┛

$terminal = kitty
$browser = firefox
$filemanager = $terminal -e lf
$menu = rofi -show drun
$editor = zeditor

# ┏┓┏┳┓┏┓┳┓┏┳┓┳┳┏┓
# ┗┓ ┃ ┣┫┣┫ ┃ ┃┃┃┃
# ┗┛ ┻ ┛┗┛┗ ┻ ┗┛┣┛

# exec-once=kanshi
exec-once=hyprpaper
exec-once=hypridle
exec-once=waybar
exec-once=/usr/lib/polkit-kde-authentication-agent-1
exec = gsettings set org.gnome.desktop.interface gtk-theme "Adwaita-dark"   # for GTK3 apps
exec = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"   # for GTK4 apps

# ┳┳┓┏┓┳┳┏┳┓
# ┃┃┃┃┃┃┃ ┃
# ┻┛┗┣┛┗┛ ┻

input {
  kb_layout = br
  kb_variant = abnt2

  follow_mouse = 1

  sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

  touchpad {
      natural_scroll = true
  }
}

gestures {
  workspace_swipe = true
}

# ┏┓┳┓┓┏
# ┣ ┃┃┃┃
# ┗┛┛┗┗┛

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_STYLE_OVERRIDE,kvantum
# env = PATH,$HOME/.local/bin:$PATH

# ┏┓┏┓┳┓┏┓┳┓┏┓┓
# ┃┓┣ ┃┃┣ ┣┫┣┫┃
# ┗┛┗┛┛┗┗┛┛┗┛┗┗┛

general {
  gaps_in = 4
  gaps_out = 4

  border_size = 2

  # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
  col.active_border = rgba(f2f4f8ee)
  col.inactive_border = rgba(595959aa)

  # Set to true enable resizing windows by clicking and dragging on borders and gaps
  resize_on_border = false

  # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
  allow_tearing = false

  layout = master
}

dwindle {
  pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
  preserve_split = true # You probably want this
}

master {
  new_status = master
}

misc {
  force_default_wallpaper = -1
  disable_hyprland_logo = true
}

# ┳┓┏┓┏┓┏┓┳┓┏┓┏┳┓┳┏┓┳┓┏┓
# ┃┃┣ ┃ ┃┃┣┫┣┫ ┃ ┃┃┃┃┃┗┓
# ┻┛┗┛┗┛┗┛┛┗┛┗ ┻ ┻┗┛┛┗┗┛

decoration {
  rounding = 5

  # Change transparency of focused and unfocused windows
  active_opacity = 1.0
  inactive_opacity = 1.0

  drop_shadow = true
  shadow_range = 4
  shadow_render_power = 3
  col.shadow = rgba(1a1a1a00)

  # https://wiki.hyprland.org/Configuring/Variables/#blur
  blur {
    enabled = true
    size = 3
    passes = 1

    vibrancy = 0.1696
  }
}

# ┏┓┳┓┳┳┳┓┏┓┏┳┓┳┏┓┳┓┏┓
# ┣┫┃┃┃┃┃┃┣┫ ┃ ┃┃┃┃┃┗┓
# ┛┗┛┗┻┛ ┗┛┗ ┻ ┻┗┛┛┗┗┛

animations {
  enabled = true

  # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

  bezier = myBezier, 0.05, 0.9, 0.1, 1.05
  animation = windows, 1, 7, myBezier
  animation = windowsOut, 1, 7, default, popin 80%
  animation = border, 1, 10, default
  animation = borderangle, 1, 8, default
  animation = fade, 1, 7, default
  animation = workspaces, 1, 6, default
}

# ┓┏┓┏┓┓┏┳┓┳┳┓┳┓┳┳┓┏┓┏┓
# ┃┫ ┣ ┗┫┣┫┃┃┃┃┃┃┃┃┃┓┗┓
# ┛┗┛┗┛┗┛┻┛┻┛┗┻┛┻┛┗┗┛┗┛

$mainMod = SUPER

bind = $mainMod, Q, exec, $terminal
bind = $mainMod, W, exec, $browser
bind = $mainMod, E, exec, $filemanager
bind = $mainMod, R, exec, $menu
bind = $mainMod, T, exec, $editor

bind = $mainMod, C, killactive,
bind = $mainMod SHIFT, M, exit,
bind = $mainMod SHIFT, F, togglefloating,
bind = $mainMod, F, fullscreen,

bind = ,Print, exec, screenshot.sh screen
bind = SHIFT, Print, exec, screenshot.sh region

# Power menu
bindl = $mainMod, L, exec, powermenu.sh

# Volume controls
binde = ,XF86AudioRaiseVolume, exec, volume.sh up
binde = ,XF86AudioLowerVolume, exec, volume.sh down
bind = ,XF86AudioMute, exec, volume.sh mute

# Brightness control
binde = ,XF86MonBrightnessUp, exec, brightness.sh up
binde = ,XF86MonBrightnessDown, exec, brightness.sh down

# Master layout
bind = $mainMod, S, layoutmsg, swapwithmaster master
bind = $mainMod, A, layoutmsg, cycleprev
bind = $mainMod, D, layoutmsg, cyclenext

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Special Workspaces (mimic minimize)
bind = $mainMod, P, togglespecialworkspace, magic
bind = $mainMod, P, movetoworkspace, +0
bind = $mainMod, P, togglespecialworkspace, magic
bind = $mainMod, P, movetoworkspace, special:magic
bind = $mainMod, P, togglespecialworkspace, magic

# ┳┓┳┳┓ ┏┓┏┓
# ┣┫┃┃┃ ┣ ┗┓
# ┛┗┗┛┗┛┗┛┗┛

windowrulev2 = suppressevent maximize, class:.* # You'll probably like this.
windowrulev2 = float,title:(Bitwarden)
