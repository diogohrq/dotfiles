# в”ів”ів”“в”Џв”“в”ів”“в”ів”Џв”ів”“в”Џв”“в”ів”“в”Џв”“
# в”ѓв”ѓв”ѓв”ѓв”ѓв”ѓв”ѓв”ѓ в”ѓ в”ѓв”ѓв”Јв”«в”—в”“
# в”› в”—в”—в”›в”›в”—в”» в”» в”—в”›в”›в”—в”—в”›

monitor=eDP-1,1920x1080@60,auto,1.2
monitor=HDMI-A-1,disable
# monitor=eDP-1,disable
# monitor=HDMI-A-1,1920x1080@60,auto,1

xwayland {
  force_zero_scaling = true
}

# в”Џв”“в”Џв”ів”“в”Џв”“в”ів”“в”Џв”ів”“в”ів”ів”Џв”“
# в”—в”“ в”ѓ в”Јв”«в”Јв”« в”ѓ в”ѓв”ѓв”ѓв”ѓ
# в”—в”› в”» в”›в”—в”›в”— в”» в”—в”›в”Јв”›

# exec-once=kanshi
exec-once=hyprpaper
exec-once=hypridle
exec-once=waybar
exec-once=/usr/lib/polkit-kde-authentication-agent-1
exec=gsettings set org.gnome.desktop.interface gtk-theme "Adwaita-dark"   # for GTK3 apps
exec=gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"   # for GTK4 apps

# в”ів”ів”“в”Џв”“в”ів”ів”Џв”ів”“
# в”ѓв”ѓв”ѓв”ѓв”ѓв”ѓв”ѓ в”ѓ
# в”»в”›в”—в”Јв”›в”—в”› в”»

input {
  kb_layout = br
  kb_variant = abnt2

  follow_mouse = 1

  sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

  touchpad {
    natural_scroll = true
    disable_while_typing = true 
    drag_lock = true
  }

}

gestures {
  workspace_swipe = true
}

# в”Џв”“в”ів”“в”“в”Џ
# в”Ј в”ѓв”ѓв”ѓв”ѓ
# в”—в”›в”›в”—в”—в”›

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_STYLE_OVERRIDE,kvantum
env = TERMINAL,kitty
env = BROWSER,firefox
env = FILEMANAGER,kitty -e lf
env = MENU,rofi -show drun
env = EDITOR,nvim
env = NOTETAKING,obsidian
env = PATH,$HOME/.local/bin/:$PATH

# в”Џв”“в”Џв”“в”ів”“в”Џв”“в”ів”“в”Џв”“в”“
# в”ѓв”“в”Ј в”ѓв”ѓв”Ј в”Јв”«в”Јв”«в”ѓ
# в”—в”›в”—в”›в”›в”—в”—в”›в”›в”—в”›в”—в”—в”›

general {
  gaps_in = 4
  gaps_out = 4

  border_size = 2

  col.active_border = rgba(DCD7BAEE)
  col.inactive_border = rgba(595959AA)

  resize_on_border = true

  allow_tearing = false

  layout = master
}

master {
  new_status = master
}

misc {
  force_default_wallpaper = -1
  disable_hyprland_logo = true
  enable_swallow = true
  swallow_regex = ^(kitty)$
}

# в”ів”“в”Џв”“в”Џв”“в”Џв”“в”ів”“в”Џв”“в”Џв”ів”“в”ів”Џв”“в”ів”“в”Џв”“
# в”ѓв”ѓв”Ј в”ѓ в”ѓв”ѓв”Јв”«в”Јв”« в”ѓ в”ѓв”ѓв”ѓв”ѓв”ѓв”—в”“
# в”»в”›в”—в”›в”—в”›в”—в”›в”›в”—в”›в”— в”» в”»в”—в”›в”›в”—в”—в”›

decoration {
  rounding = 5

  # Change transparency of focused and unfocused windows
  active_opacity = 1.0
  inactive_opacity = 1.0

  drop_shadow = false
  shadow_range = 4
  shadow_render_power = 3
  col.shadow = rgba(1a1a1a00)

  blur {
    enabled = false
    size = 3
    passes = 1

    vibrancy = 0.1696
  }
}

# в”Џв”“в”ів”“в”ів”ів”ів”“в”Џв”“в”Џв”ів”“в”ів”Џв”“в”ів”“в”Џв”“
# в”Јв”«в”ѓв”ѓв”ѓв”ѓв”ѓв”ѓв”Јв”« в”ѓ в”ѓв”ѓв”ѓв”ѓв”ѓв”—в”“
# в”›в”—в”›в”—в”»в”› в”—в”›в”— в”» в”»в”—в”›в”›в”—в”—в”›

animations {
  enabled = true

  bezier = myBezier, 0.05, 0.7, 0.1, 1
  animation = windows, 1, 5, myBezier
  animation = windowsOut, 1, 5, default, popin 80%
  animation = border, 1, 5, default
  animation = borderangle, 0, 8, default
  animation = fade, 1, 5, default
  animation = workspaces, 1, 4.5, default
}

# в”“в”Џв”“в”Џв”“в”“в”Џв”ів”“в”ів”ів”“в”ів”“в”ів”ів”“в”Џв”“в”Џв”“
# в”ѓв”« в”Ј в”—в”«в”Јв”«в”ѓв”ѓв”ѓв”ѓв”ѓв”ѓв”ѓв”ѓв”ѓв”“в”—в”“
# в”›в”—в”›в”—в”›в”—в”›в”»в”›в”»в”›в”—в”»в”›в”»в”›в”—в”—в”›в”—в”›

$mainMod = SUPER

bind = $mainMod, Q, exec, $TERMINAL
bind = $mainMod, W, exec, $BROWSER
bind = $mainMod, E, exec, $FILEMANAGER
bind = $mainMod, R, exec, $MENU

bind = $mainMod, C, killactive,
bind = $mainMod SHIFT, M, exit,
bind = $mainMod SHIFT, F, togglefloating,
bind = $mainMod, F, fullscreen,

bind = ,Print, exec, screenshot.sh screen
bind = SHIFT, Print, exec, screenshot.sh region

# Power menu
bindl = $mainMod, P, exec, powermenu.sh 

# Volume controls
binde = ,XF86AudioRaiseVolume, exec, volume.sh up
binde = ,XF86AudioLowerVolume, exec, volume.sh down
bind = ,XF86AudioMute, exec, volume.sh mute

# Brightness control
binde = ,XF86MonBrightnessUp, exec, brightness.sh up
binde = ,XF86MonBrightnessDown, exec, brightness.sh down

# Master layout
bind = $mainMod, S, layoutmsg, swapwithmaster master
bind = $mainMod, A, layoutmsg, cycleprev
bind = $mainMod, D, layoutmsg, cyclenext

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, M, togglespecialworkspace, magic
bind = $mainMod, M, movetoworkspace, +0
bind = $mainMod, M, togglespecialworkspace, magic
bind = $mainMod, M, movetoworkspace, special:magic
bind = $mainMod, M, togglespecialworkspace, magic

# Special Workspaces
workspace = special:term, on-created-empty:$TERMINAL
workspace = special:notes, on-created-empty:$NOTETAKING

bind = $mainMod, U, togglespecialworkspace, notes
bind = $mainMod, I, togglespecialworkspace, term

# Switch to previous and next workspaces 
bind = $mainMod SHIFT, A, workspace, r-1
bind = $mainMod SHIFT, D, workspace, r+1

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Just sends the current window to another workspace with mainMod + CTRL + [0-9]
bind = $mainMod CTRL, 1, movetoworkspacesilent, 1
bind = $mainMod CTRL, 2, movetoworkspacesilent, 2
bind = $mainMod CTRL, 3, movetoworkspacesilent, 3
bind = $mainMod CTRL, 4, movetoworkspacesilent, 4
bind = $mainMod CTRL, 5, movetoworkspacesilent, 5
bind = $mainMod CTRL, 6, movetoworkspacesilent, 6
bind = $mainMod CTRL, 7, movetoworkspacesilent, 7
bind = $mainMod CTRL, 8, movetoworkspacesilent, 8
bind = $mainMod CTRL, 9, movetoworkspacesilent, 9
bind = $mainMod CTRL, 0, movetoworkspacesilent, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# в”ів”“в”ів”ів”“ в”Џв”“в”Џв”“
# в”Јв”«в”ѓв”ѓв”ѓ в”Ј в”—в”“
# в”›в”—в”—в”›в”—в”›в”—в”›в”—в”›

windowrulev2 = suppressevent maximize, class:.* # You'll probably like this.
windowrulev2 = idleinhibit fullscreen, class:.* # Enable idle inhibitor when a window is fullscreen
windowrulev2 = size 700 400, title:(Open File|File Upload|Volume Control|nmtui)(.*)$
windowrulev2 = float, title:(Open File|File Upload|Volume Control|nmtui|Bitwarden)(.*)$
windowrulev2 = center, title:(Open File|File Upload)(.*)$
